# Local dev: mount one directory theme. Set THEME before `docker compose up`.
# Example: THEME=netbird docker compose up
# Or create a .env file with: THEME=netbird
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command:
      - start-dev
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./themes/${THEME:-netbird}:/opt/keycloak/themes/${THEME:-netbird}:ro
