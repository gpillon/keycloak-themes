# NetBird Keycloak login theme — extends Keycloak’s bundled "keycloak" theme (PatternFly).
# Docs: https://www.keycloak.org/ui-customization/themes
parent=keycloak
import=common/keycloak

# Parent login.css first, then NetBird overrides (order matters).
styles=css/login.css css/netbird.css

meta=viewport==width=device-width,initial-scale=1

# Visual hooks for custom CSS
kcHtmlClass=login-pf netbird-login
kcBodyClass=netbird-body
kcLoginClass=login-pf-page netbird-login-page

kcLogoLink=https://netbird.io/

## Locale (add more comma-separated as needed)
locales=en,it
