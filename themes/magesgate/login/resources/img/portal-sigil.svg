<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="arc" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:0.2"/>
      <stop offset="35%" style="stop-color:#b794f6;stop-opacity:0.85"/>
      <stop offset="65%" style="stop-color:#63e6d6;stop-opacity:0.75"/>
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="core" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5ff"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer rune ring -->
  <ellipse cx="100" cy="58" rx="88" ry="48" stroke="url(#arc)" stroke-width="1.2" opacity="0.45" transform="rotate(-8 100 58)"/>
  <ellipse cx="100" cy="58" rx="72" ry="40" stroke="url(#arc)" stroke-width="0.8" opacity="0.65" transform="rotate(6 100 58)"/>
  <ellipse cx="100" cy="58" rx="56" ry="31" stroke="url(#arc)" stroke-width="1" opacity="0.9"/>
  <!-- Corner sparks -->
  <circle cx="38" cy="28" r="1.2" fill="#e8c547" opacity="0.85"/>
  <circle cx="162" cy="32" r="1" fill="#63e6d6" opacity="0.9"/>
  <circle cx="48" cy="92" r="0.9" fill="#b794f6" opacity="0.8"/>
  <circle cx="155" cy="88" r="1.1" fill="#e8c547" opacity="0.75"/>
  <!-- Portal core -->
  <ellipse cx="100" cy="58" rx="22" ry="14" fill="url(#core)" opacity="0.25" filter="url(#soft)"/>
  <ellipse cx="100" cy="58" rx="14" ry="9" stroke="url(#arc)" stroke-width="1.4" fill="none"/>
  <ellipse cx="100" cy="58" rx="6" ry="4" fill="url(#core)" opacity="0.55"/>
</svg>
